version: "3.8"

services:
  gitea:
    image: gitea/gitea:1.22
    container_name: github-clone-gitea
    restart: unless-stopped
# postgresql://gitea_qed9_user:wu4PL2zWQLoAjDavBePEX4GzSnjKL04y@dpg-d86s8j0jo89c73d0nr80-a.singapore-postgres.render.com/gitea_qed9
    environment:
      USER_UID: 1000
      USER_GID: 1000
      TZ: Asia/Kolkata

      # External PostgreSQL Database
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: dpg-d86s8j0jo89c73d0nr80-a.singapore-postgres.render.com
      GITEA__database__NAME: gitea_qed9
      GITEA__database__USER: gitea_qed9_user
      GITEA__database__PASSWD: wu4PL2zWQLoAjDavBePEX4GzSnjKL04y
      GITEA__database__SSL_MODE: require
      GITEA__database__PORT: 5432

      # Server Configuration
      GITEA__server__DOMAIN: gitea-1-22.onrender.com
      GITEA__server__ROOT_URL: https://gitea-1-22.onrender.com/
      GITEA__server__HTTP_PORT: 3000

      # SSH Configuration
      GITEA__server__SSH_DOMAIN: localhost
      GITEA__server__SSH_PORT: 2222
      GITEA__server__START_SSH_SERVER: true
      GITEA__server__SSH_LISTEN_PORT: 2222

    ports:
      - "3000:3000"
      - "2222:2222"

    volumes:
      - gitea_data:/data

volumes:
  gitea_data: