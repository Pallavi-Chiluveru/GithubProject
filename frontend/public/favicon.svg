<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Floating Sphere with rings -->
  <circle cx="24" cy="20" r="12" fill="url(#neonGlow)" filter="url(#glow)" />
  <ellipse cx="24" cy="28" rx="20" ry="6" stroke="#8b5cf6" stroke-width="2.5" fill="none" opacity="0.8" transform="rotate(-15 24 28)" />
  
  <!-- Floating micro-particles -->
  <circle cx="10" cy="12" r="1.5" fill="#3b82f6" opacity="0.7" />
  <circle cx="38" cy="15" r="2" fill="#ec4899" opacity="0.8" />
  <circle cx="24" cy="38" r="1" fill="#8b5cf6" opacity="0.6" />
</svg>